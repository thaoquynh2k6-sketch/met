<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Paytone+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Italianno&display=swap" rel="stylesheet">
    <style>
        body {
    margin: 0;
    padding: 0;
    }
        ul.header {
  list-style-type: none;
  margin: 0px 0px 0px;
  padding: 0px 10px 0px;
  display: flex;
  align-items: center;
  text-align: center;
  background-color: white;
}
ul.header li {
  width: 20%;
  white-space: nowrap;
  font-size: 100%;
  justify-content: space-between;
}
ul.header li a {
  color: #623e2a;
  text-decoration: none;
  font-family: "Paytone One", sans-serif;
  font-size: 14px;
  font-style: normal;
}

ul.header li img {
    width: 100px;
    height: 100px;
    padding: 0px 80px 0px;
}
.banhphap {
    font-family: "Paytone One", sans-serif;
    font-size: 25px;
    font-weight: bold;
    color: #623e2a;
}
.anhlon img{
    width: 30vw;
    height: auto;
    border: 1px solid #623e2a;
    border-radius: 5%;
}
.anhlon {
    padding: 0 7vw 0;
    justify-content: center;
}
.tenbanh {
    font-family: 'Italianno';
    font-size: 60px;
    color: #623e2a;
    text-align: left;
}
.dong3 {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-direction: row;
}
.soluong {
    display: flex;
    align-items: center;
    gap: 10px;
}
.gia {
    font-family: "montserrat", sans-serif;
    font-size: 30px;
    color: #623e2a;
    font-weight: 290;
}
.giam img, .tang img {
    width: 25px;
    height: 25px;
}
.so {
    font-family: "montserrat", sans-serif;
    font-size: 30px;
    color: #623e2a;
    font-weight: 290;
}
.nglieu {
    font-family: "Montserrat", sans-serif;
    font-size: 30px;
    color: #623e2a;
    font-weight: bold;
    margin-bottom: 0;
    text-align: left;
}
.des {
    font-family: "Montserrat", sans-serif;
    font-size: 20px;
    font-weight: 250;
    color: #623e2a;
    width: 40vw;
    text-align: justify;
    text-indent: 2em;
    line-height: 130%;
    margin-top: -30px;
}
table {
    align-items: center;
    width: 40%;
    margin: 20px auto;
    border-collapse: collapse;
    text-align: left;
}.cot2 {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 20px;
}
.chu {
    display: flex;
    align-items: center;
    padding-right: 5vw;
}
.tgh img {
    width: 250px;
    height: 70px;
}
.tgh {
    display: flex;
    justify-content: center;
    padding-bottom: 50px;
}
</style>
</head>
<body>
    <ul class="header">
        <li><a href="https://www.1001fonts.com/catchy-mager-font.html">Sản phẩm</a></li>
        <li><a href="https://www.1001fonts.com/catchy-mager-font.html">About us</a></li>
        <li><img src="logo tách.png"></li>
        <li><a href="https://www.1001fonts.com/catchy-mager-font.html">Đăng nhập</a></li>
        <li><a href="https://www.1001fonts.com/catchy-mager-font.html">Giỏ hàng</a></li>
    </ul>
    <table>
        <tr>
            <td class="anhlon">
                <img src="" alt="">
            </td>
            <td class="chu">

                <div class="tenbanh"></div>

                    <div class="soluong"></div>

                    <div class="so">1</div>
                    <button class="tang"><img src="dấu cộng.png" alt="Tăng"></button>
                </div>
                <div class="nglieu"></div>
                <div class="des">
                    <p></p>
                    <p></p>
                </div>
            </div>
            </td>
        </tr>
        <tr class="row2">
            <td>
            </td>
            <td>
                <button class="tgh"><img src="them gio hang.png" alt=""></button>
            </td>
        </tr></table>
