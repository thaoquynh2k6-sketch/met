<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giỏ hàng - 8AM Bakery</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: #f5f5f5;
        color: #333;
        min-height: 100vh;
        padding: 20px 0;
      }

      .cart-container {
        width: 100%;
        max-width: 420px;
        margin: 0 auto 60px;
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
      }

      .cart-header {
        padding: 16px 20px;
        border-bottom: 1px solid #eee;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 1.25rem;
        font-weight: 600;
        background: #fff;
      }

      .close-btn {
        font-size: 1.6rem;
        color: #777;
        cursor: pointer;
      }

      /* Trạng thái rỗng */
      .empty-state {
        padding: 80px 24px 60px;
        text-align: center;
      }

      .empty-text {
        color: #777;
        font-size: 1.1rem;
        margin-bottom: 32px;
        line-height: 1.5;
      }

      .btn-primary {
        display: block;
        width: 100%;
        max-width: 300px;
        margin: 0 auto;
        padding: 15px;
        background: #6b4e31;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        text-align: center;
      }

      /* Phần có sản phẩm (giữ lại để sau này mở rộng) */
      .has-item .item {
        padding: 20px;
        border-bottom: 1px solid #eee;
      }

      .item-row {
        display: flex;
        gap: 16px;
        align-items: flex-start;
      }

      .item-img {
        width: 90px;
        height: 90px;
        object-fit: cover;
        border-radius: 10px;
        background: #f8f8f8;
      }

      .item-info {
        flex: 1;
      }

      .item-name {
        font-size: 1.12rem;
        font-weight: 600;
        margin-bottom: 6px;
      }

      .item-desc {
        font-size: 0.95rem;
        color: #555;
        margin-bottom: 10px;
      }

      .item-price {
        font-size: 1.18rem;
        font-weight: 700;
        color: #6b4e31;
      }

      .remove {
        color: #6b4e31;
        font-size: 0.92rem;
        margin-top: 10px;
        cursor: pointer;
        display: inline-block;
      }

      .note-btn {
        margin-top: 14px;
        padding: 9px 20px;
        background: #6b4e31;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 0.96rem;
        font-weight: 500;
        cursor: pointer;
      }

      .quantity-control {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 12px 0 10px;
      }

      .qty-btn {
        width: 34px;
        height: 34px;
        border: 1px solid #ddd;
        background: white;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 1.3rem;
      }

      .qty {
        font-size: 1.1rem;
        font-weight: 600;
        min-width: 20px;
        text-align: center;
      }

      .suggest-section {
        padding: 16px 20px;
        background: #fafafa;
        border-top: 1px solid #eee;
        border-bottom: 1px solid #eee;
      }

      .suggest-title {
        font-size: 1.02rem;
        font-weight: 600;
        color: #444;
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
      }

      .total {
        padding: 18px 20px;
        display: flex;
        justify-content: space-between;
        font-size: 1.12rem;
        font-weight: 500;
      }

      .total-price {
        font-weight: 700;
        color: #6b4e31;
      }

      .continue-btn {
        padding: 16px;
        background: #6b4e31;
        color: white;
        border: none;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        text-transform: uppercase;
        letter-spacing: 0.4px;
      }
    </style>
  </head>
  <body>
    <div class="cart-container">
      <div class="cart-header">
        Giỏ hàng
        <span class="close-btn" onclick="history.back()">×</span>
      </div>

      <!-- Chỉ hiển thị giỏ hàng trống -->
      <div class="empty-state">
        <div class="empty-text">Chưa có sản phẩm nào trong giỏ</div>
        <button class="btn-primary">XEM TẤT CẢ SẢN PHẨM</button>
      </div>
    </div>

    <script>
      // ==================== JAVASCRIPT ĐẦY ĐỦ ====================

      // Các hàm dự phòng (sẽ dùng khi có sản phẩm trong giỏ hàng)
      function renderCart() {
        console.log("Giỏ hàng hiện đang trống");
      }

      function changeQuantity(index, change) {
        console.log("Chức năng thay đổi số lượng sẽ dùng sau");
      }

      function removeItem(index) {
        console.log("Chức năng xóa sản phẩm sẽ dùng sau");
      }

      function addNote(index) {
        const note = prompt("Nhập lời chúc cho sản phẩm này:");
        if (note) {
          alert(`Đã lưu lời chúc: "${note}"`);
        }
      }

      function proceedToCheckout() {
        alert("Giỏ hàng của bạn đang trống!");
      }

      // Khởi chạy khi trang tải xong
      document.addEventListener("DOMContentLoaded", function () {
        console.log(
          "Trang giỏ hàng đã tải thành công - Hiện tại giỏ hàng đang trống",
        );
      });
    </script>
  </body>
</html>
