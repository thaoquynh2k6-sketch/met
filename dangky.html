<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đăng ký – 8 a.m</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Paytone+One&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #e8ddd4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Montserrat', sans-serif;
    }

    .card {
      background: #f5ede6;
      border: 1.5px solid #d9c4b5;
      border-radius: 20px;
      padding: 32px 40px 40px;
      width: 420px;
      max-width: 95vw;
      box-shadow: 0 10px 40px rgba(80, 40, 10, 0.10);
      position: relative;
    }

    /* ── Header ── */
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }
    .card-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .btn-back {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      color: #7a4a1e;
      transition: color 0.15s;
    }
    .btn-back:hover { color: #3b2210; }
    .card-header span {
      font-family: 'Paytone One', sans-serif;
      font-weight: 400;
      font-size: 15px;
      color: #3b2210;
    }
    .btn-close {
      background: none;
      border: none;
      font-size: 22px;
      color: #999;
      cursor: pointer;
      line-height: 1;
      padding: 0 2px;
      transition: color 0.15s;
    }
    .btn-close:hover { color: #5c3317; }

    /* ── Title ── */
    .card-title {
      font-size: 18px;
      font-weight: 700;
      color: #2b1a0e;
      margin-bottom: 22px;
      line-height: 1.35;
    }

    /* ── Input group ── */
    .input-group {
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1.5px solid #c8b09a;
      padding-bottom: 10px;
      margin-bottom: 20px;
      transition: border-color 0.2s;
    }
    .input-group:focus-within { border-color: #7a4a1e; }
    .input-group svg { flex-shrink: 0; }
    .input-group input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 14.5px;
      color: #2b1a0e;
      background: transparent;
      font-family: 'Montserrat', sans-serif;
    }
    .input-group input::placeholder { color: #b09080; }

    .btn-eye {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      color: #b09080;
      transition: color 0.15s;
    }
    .btn-eye:hover { color: #7a4a1e; }

    /* ── Error message ── */
    .error-msg {
      display: none;
      font-size: 11.5px;
      color: #c0392b;
      margin-top: -14px;
      margin-bottom: 14px;
      padding-left: 28px;
    }
    .error-msg.show { display: block; }

    /* ── Button ── */
    .btn-register {
      width: 100%;
      padding: 16px;
      background: #6b3a1f;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14.5px;
      font-weight: 400;
      letter-spacing: 2.5px;
      cursor: pointer;
      transition: background 0.18s, transform 0.1s;
      font-family: 'Paytone One', sans-serif;
      margin-top: 6px;
    }
    .btn-register:hover { background: #7a4520; }
    .btn-register:active { transform: scale(0.98); }
    .btn-register:disabled {
      background: #c0a090;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #3b2210;
      color: white;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Montserrat', sans-serif;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 15px;
      height: 15px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="card">
  <!-- Header -->
  <div class="card-header">
    <div class="card-header-left">
      <button class="btn-back" id="btnBack" title="Quay lại">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
      </button>
      <span>Đăng ký</span>
    </div>
    <button class="btn-close" id="btnClose" title="Đóng">×</button>
  </div>

  <!-- Title -->
  <div class="card-title">Tạo tài khoản 8 a.m của bạn</div>

  <!-- Form -->
  <div id="registerForm">

    <!-- Username -->
    <div class="input-group" id="usernameGroup">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="#7a4a1e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
        <!-- hat detail -->
        <path d="M8 7 Q12 3 16 7" stroke="#7a4a1e" stroke-width="1.4" fill="none"/>
      </svg>
      <input type="text" id="username" placeholder="Tên đăng nhập"
        maxlength="50" autocomplete="username"/>
    </div>
    <div class="error-msg" id="usernameError">Tên đăng nhập ít nhất 4 ký tự, không chứa khoảng trắng.</div>

    <!-- Full name -->
    <div class="input-group" id="fullnameGroup">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="#7a4a1e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <input type="text" id="fullname" placeholder="Họ và tên"
        maxlength="80" autocomplete="name"/>
    </div>
    <div class="error-msg" id="fullnameError">Vui lòng nhập họ và tên (ít nhất 2 ký tự).</div>

    <!-- Phone -->
    <div class="input-group" id="phoneGroup">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="#7a4a1e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 16.92v3a2 2 0 01-2.18 2
          19.79 19.79 0 01-8.63-3.07
          A19.5 19.5 0 015.13 12.7
          19.79 19.79 0 012.12 4.18
          2 2 0 014.11 2h3a2 2 0 012 1.72
          c.127.96.361 1.903.7 2.81
          a2 2 0 01-.45 2.11L8.09 9.91
          a16 16 0 006 6l1.27-1.27
          a2 2 0 012.11-.45
          c.907.339 1.85.573 2.81.7
          A2 2 0 0122 16.92z"/>
      </svg>
      <input type="tel" id="phone" placeholder="Nhập số điện thoại"
        maxlength="11" autocomplete="tel" inputmode="numeric"/>
    </div>
    <div class="error-msg" id="phoneError">Vui lòng nhập số điện thoại hợp lệ (10 chữ số).</div>

    <!-- Email -->
    <div class="input-group" id="emailGroup">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="#7a4a1e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <polyline points="2,4 12,13 22,4"/>
      </svg>
      <input type="email" id="email" placeholder="Mail"
        maxlength="100" autocomplete="email"/>
    </div>
    <div class="error-msg" id="emailError">Vui lòng nhập địa chỉ email hợp lệ.</div>

    <!-- Password -->
    <div class="input-group" id="passGroup">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="#7a4a1e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0110 0v4"/>
      </svg>
      <input type="password" id="password" placeholder="Mật khẩu"
        maxlength="64" autocomplete="new-password"/>
      <button class="btn-eye" id="btnEye" type="button" title="Hiện/Ẩn mật khẩu">
        <svg id="iconEyeOpen" width="19" height="19" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <svg id="iconEyeOff" width="19" height="19" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"
          style="display:none">
          <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8
            a18.45 18.45 0 015.06-5.94
            M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8
            a18.5 18.5 0 01-2.16 3.19
            m-6.72-1.07a3 3 0 11-4.24-4.24"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
      </button>
    </div>
    <div class="error-msg" id="passError">Mật khẩu ít nhất 6 ký tự.</div>

    <!-- Register button -->
    <button class="btn-register" id="btnRegister" type="button">ĐĂNG KÝ</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const $ = id => document.getElementById(id);

  /* ── Toast ── */
  function showToast(msg, duration = 3000) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
  }

  /* ── Field error ── */
  function setError(groupId, errorId, show) {
    const g = $(groupId), e = $(errorId);
    if (show) {
      g.style.borderBottomColor = '#c0392b';
      e.classList.add('show');
    } else {
      g.style.borderBottomColor = '';
      e.classList.remove('show');
    }
  }

  /* ── Validators ── */
  const validators = {
    username : v => /^[^\s]{4,}$/.test(v.trim()),
    fullname : v => v.trim().length >= 2,
    phone    : v => /^0[3-9]\d{8}$/.test(v.trim()),
    email    : v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim()),
    password : v => v.length >= 6,
  };

  const fields = [
    { input: 'username', group: 'usernameGroup', error: 'usernameError' },
    { input: 'fullname', group: 'fullnameGroup', error: 'fullnameError' },
    { input: 'phone',    group: 'phoneGroup',    error: 'phoneError'    },
    { input: 'email',    group: 'emailGroup',    error: 'emailError'    },
    { input: 'password', group: 'passGroup',     error: 'passError'     },
  ];

  /* ── Live validation ── */
  fields.forEach(({ input, group, error }) => {
    const el = $(input);

    // Phone: digits only
    if (input === 'phone') {
      el.addEventListener('input', () => {
        el.value = el.value.replace(/\D/g, '');
        if ($(error).classList.contains('show'))
          setError(group, error, !validators.phone(el.value));
      });
    } else {
      el.addEventListener('input', () => {
        if ($(error).classList.contains('show'))
          setError(group, error, !validators[input](el.value));
      });
    }

    el.addEventListener('blur', () => {
      setError(group, error, !validators[input](el.value));
    });

    // Enter key
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter') $('btnRegister').click();
    });
  });

  /* ── Toggle password ── */
  $('btnEye').addEventListener('click', () => {
    const inp = $('password');
    const isText = inp.type === 'text';
    inp.type = isText ? 'password' : 'text';
    $('iconEyeOpen').style.display = isText ? 'block' : 'none';
    $('iconEyeOff').style.display  = isText ? 'none'  : 'block';
  });

  /* ── Submit ── */
  $('btnRegister').addEventListener('click', async () => {
    // Validate all
    let allOk = true;
    fields.forEach(({ input, group, error }) => {
      const ok = validators[input]($(input).value);
      setError(group, error, !ok);
      if (!ok) allOk = false;
    });
    if (!allOk) return;

    // Loading
    const btn = $('btnRegister');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Đang đăng ký...';

    try {
      // Simulate API – replace with real fetch
      await new Promise(r => setTimeout(r, 1500));

      /*
      // ── Real API example ──
      const res = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username : $('username').value.trim(),
          fullname : $('fullname').value.trim(),
          phone    : $('phone').value.trim(),
          email    : $('email').value.trim(),
          password : $('password').value,
        })
      });
      if (!res.ok) throw new Error((await res.json()).message || 'Lỗi đăng ký');
      const data = await res.json();
      window.location.href = '/login';
      */

      showToast('✓ Đăng ký thành công! Chào mừng bạn đến với 8 a.m.');
      btn.innerHTML = '✓ THÀNH CÔNG';
      btn.style.background = '#2e7d32';

    } catch (err) {
      showToast('✗ ' + (err.message || 'Đăng ký thất bại, thử lại.'));
      btn.disabled = false;
      btn.innerHTML = 'ĐĂNG KÝ';
    }
  });

  /* ── Back / Close ── */
  $('btnBack').addEventListener('click', () => {
    showToast('Quay lại trang đăng nhập...');
  });
  $('btnClose').addEventListener('click', () => {
    showToast('Đã đóng form đăng ký.');
  });
</script>
</body>
</html>
