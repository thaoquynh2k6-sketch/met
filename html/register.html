<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng ký</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.register-box{
    width:360px;
    background:#f7f5f3;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 0 2px #c9b7a6;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    color:#6b3f26;
}

.title{
    margin:15px 0 25px 0;
    color:#6b3f26;
    text-align:center;
}

.input-group{
    display:flex;
    align-items:center;
    color:#6b3f26;
    border-bottom:1px solid #ddd;
    margin-bottom:18px;
}

.input-group input{
    border:none;
    outline:none;
    background:none;
    color:#6b3f26;
    padding:10px 0;
    width:100%;
    flex:1;
}
.input-group input::placeholder{
    border:none;
    outline:none;
    background:none;
    color:#6b3f26;
    padding:10px 0;
    width:100%;
    flex:1;
}
.btn-register{
    width:100%;
    padding:12px;
    background:#6b3f26;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
.btn-close {
      background: none;
      border: none;
      font-size: 22px;
      color: #999;
      cursor: pointer;
      line-height: 1;
      padding: 0 2px;
      transition: color 0.15s;
}
.input-group i{
    margin-right:10px;
    color:#6b3f26;
    display:flex;
    align-items:center;
}

</style>
</head>

<body>

<div class="register-box">
    <form action="register.php" method="post">
        <div class="header">
            <span><i class="fa-solid fa-arrow-left"></i></span>
            <h3>Đăng ký</h3>
            <button type="button" class="btn-close" id="btnClose">×</button>
        </div>
        <p class="title">Tạo tài khoản 8 a.m của bạn</p>
        
        <div class="input-group">
            <i class="fa-solid fa-user"></i>
            <input id="username" name="username" type="text" placeholder="Tên đăng nhập" required>
        </div>

        <div class="input-group">
            <i class="fa-solid fa-id-card"></i>
            <input id="fullname" name="fullname" type="text" placeholder="Họ và tên" required>
        </div>

        <div class="input-group">
            <i class="fa-solid fa-phone"></i>
            <input id="phone" name="phone" type="text" placeholder="Nhập số điện thoại" 
            minlength="10" maxlength="10" 
            pattern="[0-9]{10}"required>
        </div>

        <div class="input-group">
            <i class="fa-solid fa-envelope"></i>
            <input id="email" name="email" type="email" placeholder="Mail" required>
        </div>

        <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input id="password" name="password" type="password" placeholder="Mật khẩu" required>
        </div>

        <button id="register" name="register" type="submit" class="btn-register">ĐĂNG KÝ</button>
    </form>
</div>

</body>
<script src="register.js"></script>
</html>
